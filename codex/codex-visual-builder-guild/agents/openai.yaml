display_name: Codex Visual Builder Guild
short_description: Run screenshot-driven UI polish with imagegen, vision, and specialist design lenses.
default_prompt: Use codex-visual-builder-guild on this app. Use the in-app browser as live context when available, run it, screenshot desktop, tablet, mobile, and one awkward in-between width, inspect screenshots with Codex App vision, record concrete vision observations by viewport, fix the single highest-impact visual issue first, use at most 1-2 specialist lenses only if screenshots prove they are needed, capture after screenshots with local paths, use imagegen only for integrated assets, use vision-backed lens handoff packets when more than one specialist is useful, and finish with the Run Report Contract including state matrix, accepted visual change, and automation notes.
