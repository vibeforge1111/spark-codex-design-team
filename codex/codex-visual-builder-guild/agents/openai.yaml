display_name: Codex Visual Builder Guild
short_description: Run screenshot-driven UI polish with imagegen, vision, and specialist design lenses.
default_prompt: Use codex-visual-builder-guild on this app. Run it, screenshot desktop and mobile, inspect the actual screenshots with Codex vision, record concrete vision observations by viewport, fix the single highest-impact visual issue first, use at most 1-2 specialist lenses only if screenshots prove they are needed, capture after screenshots, and finish with the Run Report Contract: goal, viewport matrix, state matrix, screenshots inspected, vision observations, top issues, chosen issue, lens used, exact fix, verification, accepted visual change, still weak, reusable rule, automation notes.
