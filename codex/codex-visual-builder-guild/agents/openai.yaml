display_name: Codex Visual Builder Guild
short_description: Run screenshot-driven UI polish with imagegen, vision, flow clarity, and specialist design lenses.
default_prompt: Use codex-visual-builder-guild on this app. Use the in-app browser as live context when available. For new sections or important surfaces, first state the product intent and page intent: target user, core job, success moment, page job, ideal user route, scary/hard/bloated risks, and what design should make easier. Run it, screenshot desktop, tablet, mobile, and one awkward in-between width, inspect screenshots with Codex App vision, record concrete vision observations by viewport, check whether the user flow has a clear next action and is not overwhelming, check whether any reusable pattern follows or needs an art bible/component-system contract, fix the single highest-impact visual issue or flow issue first, use at most 1-2 specialist lenses only if screenshots prove they are needed, capture after screenshots with local paths, use imagegen only for integrated assets, use vision-backed lens handoff packets when more than one specialist is useful, and finish with the Run Report Contract including product intent, page intent, viewport matrix, state matrix, accepted visual change, and automation notes.
